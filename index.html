<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gaisan | ideas, repos, notes</title>
  <meta
    name="description"
    content="アイデア、つくったリポジトリ、メモをシンプルにまとめて置いておくための個人ホームページ。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-orb background-orb-a" aria-hidden="true"></div>
  <div class="background-orb background-orb-b" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="#top">gaisan</a>
    <nav class="site-nav" aria-label="primary navigation">
      <a href="#projects">Projects</a>
      <a href="#ideas">Ideas</a>
      <a href="#notes">Notes</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero reveal">
      <div class="hero-copy">
        <p class="eyebrow" id="hero-eyebrow"></p>
        <h1 id="hero-title"></h1>
        <p class="hero-summary" id="hero-summary"></p>
        <p class="hero-note" id="hero-note"></p>
        <div class="hero-actions" id="hero-links"></div>
      </div>

      <aside class="hero-panel">
        <p class="panel-label">Snapshot</p>
        <div class="stats-grid" id="stats-grid"></div>
      </aside>
    </section>

    <section class="section reveal" id="featured">
      <div class="section-heading">
        <p class="section-kicker">Pinned</p>
        <h2>まず見る場所</h2>
        <p>最近見てほしいリンクや、このページの入口になるものを置きます。</p>
      </div>
      <div class="card-grid" id="featured-grid"></div>
    </section>

    <section class="section reveal" id="projects">
      <div class="section-heading">
        <p class="section-kicker">Projects</p>
        <h2>作ったもの</h2>
        <p>GitHub リポジトリ、公開ページ、試作品などをまとめるための棚です。</p>
      </div>
      <div class="card-grid" id="projects-grid"></div>
    </section>

    <section class="section reveal" id="ideas">
      <div class="section-heading">
        <p class="section-kicker">Ideas</p>
        <h2>アイデア置き場</h2>
        <p>思いついたことを雑に投げても、後から読み返しやすい形で並ぶようにしています。</p>
      </div>
      <div class="card-grid" id="ideas-grid"></div>
    </section>

    <section class="section reveal" id="notes">
      <div class="section-heading">
        <p class="section-kicker">Notes</p>
        <h2>メモと更新</h2>
        <p>短い記録や、このサイト自体の更新ログを残すためのセクションです。</p>
      </div>
      <div class="notes-layout">
        <div class="card-grid compact-grid" id="notes-grid"></div>
        <ol class="timeline" id="timeline-list"></ol>
      </div>
    </section>
  </main>

  <footer class="site-footer reveal">
    <p id="footer-text"></p>
  </footer>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
